server {
    server_name offmetabg.com www.offmetabg.com;
    client_max_body_size 100M;
    root /var/www/offmetabg;
    index index.php index.html;

    access_log /var/log/nginx/offmetabg-access.log;
    error_log /var/log/nginx/offmetabg-error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable ETags (Cloudflare compatibility)
    etag off;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        
        # Cache headers for dynamic content
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # HTML files - short cache
    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # CSS and JavaScript - long cache with versioning
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images - long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fonts - long cache
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # JSON and XML - moderate cache
    location ~* \.(json|xml)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Media files - long cache
    location ~* \.(mp4|mp3|webm|ogg|avi|mov)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/offmetabg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/offmetabg.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name offmetabg.com www.offmetabg.com;
    client_max_body_size 100M;

    if ($host = www.offmetabg.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = offmetabg.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
